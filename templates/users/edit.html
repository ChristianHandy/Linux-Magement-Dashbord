{% extends "base.html" %}

{% block title %}Edit User — FleetPilot{% endblock %}
{% block page_icon %}&#x270F;{% endblock %}
{% block page_title %}Edit User: {{ user.username }}{% endblock %}

{% block content %}

<div style="max-width:560px;">
  <div class="card">
    <div class="card-header">
      <h3>&#x270F; Edit User</h3>
    </div>
    <form method="post">
      <div class="form-group">
        <label class="form-label">Username <span class="text-red">*</span></label>
        <input class="form-control" name="username" value="{{ user.username }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email <span class="text-muted">(optional)</span></label>
        <input class="form-control" type="email" name="email" value="{{ user.email or '' }}" placeholder="user@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">New Password <span class="text-muted">(leave blank to keep current)</span></label>
        <input class="form-control" type="password" name="password" placeholder="new password">
      </div>
      <div class="form-group">
        <label style="display:flex; align-items:center; gap:0.65rem; padding:0.6rem 0.85rem; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-md); cursor:pointer;">
          <input type="checkbox" name="active" {% if user.active %}checked{% endif %}
                 style="width:16px; height:16px; accent-color:var(--accent-blue);">
          <span><strong style="color:var(--text-primary);">Active Account</strong></span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">Roles <span class="text-red">*</span></label>
        <div style="display:flex; flex-direction:column; gap:0.5rem; margin-top:0.5rem;">
          {% for role in all_roles %}
          <label style="display:flex; align-items:center; gap:0.65rem; padding:0.6rem 0.85rem; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-md); cursor:pointer; transition:all 0.2s;">
            <input type="checkbox" name="roles" value="{{ role.name }}" id="role_{{ role.id }}"
              {% if role.name in user_roles %}checked{% endif %}
              style="width:16px; height:16px; accent-color:var(--accent-blue);">
            <span>
              <strong style="color:var(--text-primary);">{{ role.name }}</strong>
              <span class="text-muted"> — {{ role.description }}</span>
            </span>
          </label>
          {% endfor %}
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" type="submit">&#x1F4BE; Update User</button>
        <a class="btn btn-ghost" href="/users">&#x2190; Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
