<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Disk Tools{% endblock %} — Linux Management Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
      /* Override Bootstrap to match dark theme */
      body { background: var(--bg-base); color: var(--text-primary); font-family: 'Inter', system-ui, sans-serif; }
      .navbar { background: var(--bg-surface) !important; border-bottom: 1px solid var(--border); }
      .navbar-brand { color: var(--text-primary) !important; font-weight: 700; font-size: 0.95rem; }
      .container { max-width: 1100px; }
      .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
      .card-body { color: var(--text-primary); }
      .table { color: var(--text-primary); }
      .table thead th { background: var(--bg-elevated); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; border-color: var(--border); }
      .table td, .table th { border-color: rgba(30,48,72,.5); vertical-align: middle; }
      .table-striped > tbody > tr:nth-of-type(odd) > * { background: rgba(255,255,255,.02); color: var(--text-primary); }
      .table-hover > tbody > tr:hover > * { background: rgba(255,255,255,.04); }
      .form-control, .form-select { background: var(--bg-elevated) !important; color: var(--text-primary) !important; border-color: var(--border) !important; }
      .form-control:focus, .form-select:focus { border-color: var(--accent-blue) !important; box-shadow: 0 0 0 3px rgba(59,130,246,.15) !important; }
      .alert-info { background: rgba(59,130,246,.1) !important; color: #93c5fd !important; border-color: rgba(59,130,246,.3) !important; }
      .alert-danger { background: rgba(239,68,68,.1) !important; color: #fca5a5 !important; border-color: rgba(239,68,68,.3) !important; }
      .alert-warning { background: rgba(245,158,11,.1) !important; color: #fcd34d !important; border-color: rgba(245,158,11,.3) !important; }
      .alert-success { background: rgba(16,185,129,.1) !important; color: #6ee7b7 !important; border-color: rgba(16,185,129,.3) !important; }
      .badge.bg-success { background: rgba(16,185,129,.2) !important; color: #6ee7b7 !important; border: 1px solid rgba(16,185,129,.3); }
      .badge.bg-danger  { background: rgba(239,68,68,.2)  !important; color: #fca5a5 !important; border: 1px solid rgba(239,68,68,.3); }
      .badge.bg-secondary { background: rgba(100,116,139,.2) !important; color: #94a3b8 !important; }
      .btn-primary   { background: var(--accent-blue)   !important; border-color: var(--accent-blue)   !important; }
      .btn-success   { background: var(--accent-green)  !important; border-color: var(--accent-green)  !important; }
      .btn-danger    { background: var(--accent-red)    !important; border-color: var(--accent-red)    !important; }
      .btn-secondary { background: var(--bg-elevated)   !important; border-color: var(--border)        !important; color: var(--text-secondary) !important; }
      .btn-outline-primary { color: var(--accent-blue) !important; border-color: var(--accent-blue) !important; }
      .btn-outline-primary:hover { background: var(--accent-blue) !important; color: #fff !important; }
      .btn-info { background: var(--accent-cyan) !important; border-color: var(--accent-cyan) !important; color: #000 !important; }
      .btn-warning { background: var(--accent-amber) !important; border-color: var(--accent-amber) !important; color: #000 !important; }
      .bg-dark { background: var(--bg-elevated) !important; }
      .text-muted { color: var(--text-muted) !important; }
      .border-secondary { border-color: var(--border) !important; }
      pre { background: var(--bg-base); color: #a5f3fc; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; }
      .input-group-text { background: var(--bg-elevated); border-color: var(--border); color: var(--text-secondary); }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid" style="max-width:1100px; margin:0 auto; padding:0 1.25rem;">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('disks_index') }}">
          <span style="width:30px;height:30px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;">&#x1F4BE;</span>
          Disk Tools
        </a>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-sm btn-secondary" href="{{ url_for('index') }}">&#x1F3E0; Main Menu</a>
          {% block nav_extra %}{% endblock %}
        </div>
      </div>
    </nav>
    <main class="container py-4">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-info">
            {% for message in messages %}
              {{ message }}<br>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
