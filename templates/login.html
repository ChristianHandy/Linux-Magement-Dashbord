<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Linux Management Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">&#x1F5A5;</div>
    </div>

    <h1 class="login-title">Linux Management</h1>
    <p class="login-subtitle">Sign in to your dashboard</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger" style="margin-bottom:1rem;">&#x26A0; {{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/" method="post">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-control"
          type="text"
          id="username"
          name="user"
          placeholder="Enter your username"
          required
          autocomplete="username"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="pass"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.7rem; font-size:0.95rem; margin-top:0.5rem;">
        &#x1F511; Sign In
      </button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center; font-size:0.8rem; color:var(--text-muted);">
      Linux Management Dashboard &mdash; Secure Access
    </p>
  </div>
</div>
</body>
</html>
